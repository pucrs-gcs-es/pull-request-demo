name: Java CI/CD Pipeline

on:
  push:
    branches: [ "master", "main", "staging", "develop" ]
  pull_request:
    branches: [ "master", "main", "staging" ]

permissions:
  contents: read
  packages: write

jobs:
  # =========================================================================
  # 1. JOB DE COMPILAÇÃO E TESTES (Ambiente de Testes)
  # =========================================================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar JDK 21 (Eclipse Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compilar e Instalar o Módulo 'commons'
        run: |
          cd commons
          mvn clean install

      - name: Compilar e Testar o 'microservico1'
        run: |
          cd microservico1
          mvn clean test

      - name: Compilar e Testar o 'microservico2' (com JaCoCo)
        run: |
          cd microservico2
          mvn clean test

      - name: Upload dos Relatórios de Teste (JaCoCo)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: microservico2/target/site/jacoco/

      - name: Upload dos Relatórios JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-reports
          path: |
            microservico1/target/surefire-reports/
            microservico2/target/surefire-reports/

  # =========================================================================
  # 2. JOB DE GERAÇÃO E PUBLICAÇÃO DAS IMAGENS DOCKER
  # =========================================================================
  build-docker-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Gerar os Pacotes JAR compilados
        run: |
          cd commons && mvn clean install && cd ..
          cd microservico1 && mvn clean package -DskipTests && cd ..
          cd microservico2 && mvn clean package -DskipTests && cd ..

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Exemplo de autenticação no GitHub Container Registry (GHCR)
      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build & Push - Microserviço 1
      - name: Build & Push Microserviço 1
        uses: docker/build-push-action@v5
        with:
          context: ./microservico1
          file: ./microservico1/dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/microservico1:latest
            ghcr.io/${{ github.repository }}/microservico1:${{ github.sha }}

      # Build & Push - Microserviço 2
      - name: Build & Push Microserviço 2
        uses: docker/build-push-action@v5
        with:
          context: ./microservico2
          file: ./microservico2/dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/microservico2:latest
            ghcr.io/${{ github.repository }}/microservico2:${{ github.sha }}

  # =========================================================================
  # 3. JOB DE DEPLOY EM AMBIENTE DE STAGING (Local no GitHub Actions)
  # =========================================================================
  deploy-staging:
    name: Deploy to Staging (GitHub Local)
    runs-on: ubuntu-latest
    needs: build-docker-images
    environment: staging
    if: github.ref == 'refs/heads/staging'

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar JDK 21 (Eclipse Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Gerar os Pacotes JAR compilados
        run: |
          cd commons && mvn clean install && cd ..
          cd microservico1 && mvn clean package -DskipTests && cd ..
          cd microservico2 && mvn clean package -DskipTests && cd ..

      - name: Iniciar Staging via Docker Compose
        run: docker compose up --build -d

      - name: Aguardar Inicialização dos Serviços
        run: |
          echo "Aguardando inicialização do ambiente de staging local..."
          sleep 20

      - name: Exibir Logs dos Containers
        run: docker compose logs

      - name: Validar Health Check de Microserviço 1
        run: curl -f -k "https://localhost:443/user?fn=Staging&ln=Test"

      - name: Validar Health Check de Microserviço 2
        run: curl -f -k "https://localhost:444/citation"

      - name: Encerrar Staging
        if: always()
        run: docker compose down
